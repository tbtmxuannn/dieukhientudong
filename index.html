# index.html hoàn chỉnh (code gọn, dễ sửa)

```html
<!DOCTYPE html>
<html>

<head>
  <title>Dieu khien</title>

<style>

body{  font-family:Arial;
  text-align:center;}

#buttons{  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:20px;
  margin-top:30px;}

.card{  border:2px solid black;
  padding:20px;
  margin:10px;}

button{  width:120px;
  height:50px;
  font-size:18px;}

input{  width:120px;
  height:30px;
  text-align:center;
  margin-bottom:15px;}

</style>

</head>

<body>

<h1>Dieu khien Relay</h1>

<div id="buttons"></div>

<script>

let container = document.getElementById("buttons");

for(let i=1;i<=10;i++){

  let card = document.createElement("div");
  card.className = "card";

  let name = document.createElement("input");
  name.value = "Role " + i;

  let btn = document.createElement("button");

  btn.innerText = "OFF";

  card.appendChild(name);
  card.appendChild(document.createElement("br"));
  card.appendChild(btn);

  container.appendChild(card);

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ===== FIREBASE =====

const firebaseConfig = {
apiKey: "AIzaSyAYX5dWAiOfIEgLkb0QCjYOxofQLGaDenM",
authDomain: "tbtmxuannn.firebaseapp.com",
databaseURL: "https://tbtmxuannn-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "tbtmxuannn",
storageBucket: "tbtmxuannn.firebasestorage.app",
messagingSenderId: "1015377273919",
appId: "1:1015377273919:web:3fd3950e1fc8d9e2dec48a",
measurementId: "G-W4K7TBPCY3"
};

// ===== THONG SO =====

const soRelay = 10;
const soCot = 5;
const rongNut = "120px";
const caoNut = "50px";
const rongTen = "120px";
const caoTen = "30px";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== GIAO DIEN =====

document.getElementById("buttons").style.gridTemplateColumns = `repeat(${soCot},1fr)`;

let container = document.getElementById("buttons");

for(let i=1;i<=soRelay;i++){

let card = document.createElement("div");
card.className = "card";

let name = document.createElement("input");
name.value = "Role " + i;
name.style.width = rongTen;
name.style.height = caoTen;

let btn = document.createElement("button");
btn.innerText = "OFF";
btn.style.width = rongNut;
btn.style.height = caoNut;

card.appendChild(name);
card.appendChild(document.createElement("br"));
card.appendChild(btn);

container.appendChild(card);

}

// ===== FIREBASE RELAY =====

let btns = document.querySelectorAll("button");

for(let i=0;i<soRelay;i++){

let relayName = "relay" + (i+1);

btns[i].onclick = function(){

if(btns[i].innerText == "OFF"){
btns[i].innerText = "ON";
set(ref(db,relayName),"ON");
}
else{
btns[i].innerText = "OFF";
set(ref(db,relayName),"OFF");
}

}

onValue(ref(db,relayName),(snapshot)=>{
btns[i].innerText = snapshot.val();
});

}

</script>

</body>
</html>
```
