<!DOCTYPE html>
<html>

<head>
  <title>Dieu khien</title>

<style>

body{
  font-family:Arial;
  text-align:center;
}

#buttons{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:20px;
  margin-top:30px;
}

.card{

  border:2px solid black;
  padding:20px;
  margin:10px;

}

button{

  width:120px;
  height:50px;
  font-size:18px;

}

input{

  width:120px;
  height:30px;
  text-align:center;
  margin-bottom:15px;

}

</style>

</head>

<body>

<h1>Dieu khien Relay</h1>

<div id="buttons"></div>

<script>

let container = document.getElementById("buttons");

for(let i=1;i<=10;i++){

  let card = document.createElement("div");
  card.className = "card";

  let name = document.createElement("input");
  name.value = "Role " + i;

  let btn = document.createElement("button");

  btn.innerText = "OFF";

  btn.onclick = function(){

    if(btn.innerText=="OFF"){
      btn.innerText="ON";
    }
    else{
      btn.innerText="OFF";
    }

  }

  card.appendChild(name);
  card.appendChild(document.createElement("br"));
  card.appendChild(btn);

  container.appendChild(card);

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAYX5dWAiOfIEgLkb0QCjYOxofQLGaDenM",
authDomain: "tbtmxuannn.firebaseapp.com",
databaseURL: "https://tbtmxuannn-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "tbtmxuannn",
storageBucket: "tbtmxuannn.firebasestorage.app",
messagingSenderId: "1015377273919",
appId: "1:1015377273919:web:3fd3950e1fc8d9e2dec48a",
measurementId: "G-W4K7TBPCY3"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let btns = document.querySelectorAll("button");

btns[0].onclick = function(){

if(btns[0].innerText=="OFF"){

btns[0].innerText="ON";

set(ref(db,"relay1"),"ON");

}
else{

btns[0].innerText="OFF";

set(ref(db,"relay1"),"OFF");

}

}

onValue(ref(db,"relay1"),(snapshot)=>{

btns[0].innerText = snapshot.val();

});

</script>
