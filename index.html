<!DOCTYPE html>
<html>

<head>
  <title>Dieu khien</title>

<style>

body{
  font-family:Arial;
  text-align:center;
}

#buttons{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:20px;
  margin-top:30px;
}

.card{

  border:2px solid black;
  padding:20px;
  margin:10px;

}

button{

  width:120px;
  height:50px;
  font-size:18px;

}

input{

  width:120px;
  height:30px;
  text-align:center;
  margin-bottom:15px;

}

</style>

</head>

<body>

<h1>Dieu khien Relay</h1>

<div id="buttons"></div>

<script>

let container = document.getElementById("buttons");

for(let i=1;i<=10;i++){

  let card = document.createElement("div");
  card.className = "card";

  let name = document.createElement("input");
  name.value = "Role " + i;

  let btn = document.createElement("button");

  btn.innerText = "OFF";

  btn.onclick = function(){

    if(btn.innerText=="OFF"){
      btn.innerText="ON";
    }
    else{
      btn.innerText="OFF";
    }

  }

  card.appendChild(name);
  card.appendChild(document.createElement("br"));
  card.appendChild(btn);

  container.appendChild(card);

}

</script>

</body>
</html>
