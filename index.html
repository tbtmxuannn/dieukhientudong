<!DOCTYPE html>
<html>

<head>

<title>Dieu khien</title>

<style>

body{ font-family:Arial; text-align:center; }

#buttons{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
margin-top:30px;
}

.card{
border:2px solid black;
padding:20px;
margin:10px;
}

button{
font-size:18px;
}

</style>

</head>

<body>

<h1>Dieu khien Relay</h1>

<h2>Nhiet do: <span id="nhietdo">0</span> °C</h2>
<h2>Do am: <span id="doam">0</span> %</h2>

<div id="buttons"></div>

<script type="module">

// ===== FIREBASE =====

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyAYX5dWAiOfIEgLkb0QCjYOxofQLGaDenM",
authDomain:"tbtmxuannn.firebaseapp.com",
databaseURL:"https://tbtmxuannn-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"tbtmxuannn",
storageBucket:"tbtmxuannn.firebasestorage.app",
messagingSenderId:"1015377273919",
appId:"1:1015377273919:web:3fd3950e1fc8d9e2dec48a",
measurementId:"G-W4K7TBPCY3"

};

// ===== THONG SO =====

const soRelay = 10;
const soCot = 5;

const rongNut = "120px";
const caoNut = "50px";

const rongTen = "120px";
const caoTen = "30px";

// ===== KHOI TAO =====

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== TAO GIAO DIEN =====

document.getElementById("buttons").style.gridTemplateColumns =
`repeat(${soCot},1fr)`;

let container = document.getElementById("buttons");

for(let i=1;i<=soRelay;i++){

let card = document.createElement("div");
card.className = "card";

let name = document.createElement("input");
name.value = "Role " + i;

name.style.width = rongTen;
name.style.height = caoTen;

let btn = document.createElement("button");

btn.innerText = "OFF";

btn.style.width = rongNut;
btn.style.height = caoNut;

card.appendChild(name);
card.appendChild(document.createElement("br"));
card.appendChild(btn);

container.appendChild(card);

}

// ===== RELAY =====

let btns = document.querySelectorAll("button");

for(let i=0;i<soRelay;i++){

let relayName = "relay" + (i+1);

btns[i].onclick = function(){

if(btns[i].innerText=="OFF"){

btns[i].innerText="ON";

set(ref(db,relayName),"ON");

}
else{

btns[i].innerText="OFF";

set(ref(db,relayName),"OFF");

}

}

onValue(ref(db,relayName),(snapshot)=>{

btns[i].innerText = snapshot.val();

});

}

// ===== CAM BIEN =====

onValue(ref(db,"nhietdo"),(snapshot)=>{

document.getElementById("nhietdo").innerText =
snapshot.val();

});

onValue(ref(db,"doam"),(snapshot)=>{

document.getElementById("doam").innerText =
snapshot.val();

});

</script>

</body>
</html>
